name: Build Agent

on:
  push:
    branches: [ main ]
    paths:
      - 'agent/**'        # hanya trigger kalau ada perubahan di folder agent
      - 'requirements.txt'
  workflow_dispatch:      # bisa trigger manual dari GitHub

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      # 1. Checkout kode
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Setup Python
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # 3. Install dependencies
      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      # 4. Verify native libs are installed correctly
      - name: Verify native libraries
        run: |
          python -c "import av; print(f'PyAV version: {av.__version__}')"
          python -c "import aiortc; print(f'aiortc version: {aiortc.__version__}')"
          python -c "import mss; print(f'mss version: {mss.__version__}')"
          python -c "import numpy; print(f'numpy version: {numpy.__version__}')"

      # 5. Build .exe with full native lib collection
      - name: Build agent.exe
        run: |
          pyinstaller agent/agent.spec

      # 6. Verify built exe contains needed DLLs
      - name: Verify bundled DLLs
        shell: powershell
        run: |
          Write-Host "=== Built exe size ==="
          Get-Item dist/agent.exe | Select-Object Length
          Write-Host ""
          Write-Host "=== Checking for critical DLLs in build ==="
          $buildDir = "build/agent"
          if (Test-Path $buildDir) {
            $dlls = Get-ChildItem -Path $buildDir -Recurse -Filter "*.dll" | Select-Object Name
            Write-Host "Found $($dlls.Count) DLL files"
            $dlls | ForEach-Object { Write-Host "  - $($_.Name)" }
          }

      # 7. Upload hasil .exe sebagai artifact
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: agent-windows
          path: dist/agent.exe
          retention-days: 7    # simpan 7 hari
